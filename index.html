---
layout: default
pagination:
  enabled: true
---
<section class="hero">
  <div class="wrap">
    <h1 class="hero-title">{{ site.tagline }}</h1>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="search" type="search" inputmode="search" autocomplete="off"
             data-index="{{ '/search.json' | relative_url }}"
             placeholder="Търси във всички вицове…" aria-label="Търсене на вицове">
      <button id="random" class="btn-random" type="button" title="Случаен виц">🎲 Случаен</button>
    </div>

    {% include category-nav.html %}
  </div>
</section>

<div class="wrap">
  <p id="status" class="result-status" aria-live="polite"></p>

  <div id="grid" class="grid">
    {% for j in paginator.posts %}
      {% include joke-card.html joke=j %}
    {% endfor %}
  </div>

  <div id="results" class="grid" hidden></div>
  <p id="empty" class="empty" hidden>Няма намерени вицове. Опитай друга дума.</p>

  {% include pagination.html %}
</div>
