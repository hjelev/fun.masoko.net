title: fun.masoko.net
tagline: Подбрани вицове и мъдри мисли!
description: Колекция от подбрани български вицове — със светъл/тъмен режим и мигновено търсене.
lang: bg
url: "https://fun.masoko.net"
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
permalink: /j/:name/

collections:
  jokes:
    output: true
    permalink: /j/:name/

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2

# Pagination (jekyll-paginate-v2). Pages opt in with `pagination: { enabled: true }`
# in their front matter; these are the inherited defaults.
pagination:
  enabled: true
  collection: jokes
  per_page: 10
  permalink: "/page/:num/"
  sort_field: "date"
  sort_reverse: true
  # Window of numbered page links shown around the current page.
  trail:
    before: 2
    after: 2

sass:
  style: compressed

# Keep the old Pelican source out of the generated site
exclude:
  - content/
  - themes/
  - api/
  - web-add/
  - plugins/
  - Makefile
  - fabfile.py
  - develop_server.sh
  - update.sh
  - pelicanconf.py
  - publishconf.py
  - "*.pid"
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - convert.py
  - funmasokonet.github.io/
