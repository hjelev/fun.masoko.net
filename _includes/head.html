<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">

  {%- if page.joke_title -%}
    {%- assign ttl = page.joke_title | append: " — " | append: site.title -%}
  {%- elsif page.title -%}
    {%- assign ttl = page.title | append: " — " | append: site.title -%}
  {%- else -%}
    {%- assign ttl = site.title -%}
  {%- endif -%}
  <title>{{ ttl }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}">

  <!-- Apply theme before paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  {% seo %}
</head>
